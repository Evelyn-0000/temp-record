<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>複核頁</title>

<style>
body { font-family: sans-serif; padding:20px; background:#f5f5f5;}
.card { background:white; padding:20px; border-radius:12px;}

table { width:100%; border-collapse: collapse; margin-top:10px;}
td, th { border:1px solid #ccc; padding:8px; text-align:center;}

button {
  width:100%; padding:12px; margin-top:10px;
  background:#4CAF50; color:white; border:none;
  border-radius:8px; font-size:16px;
  transition:0.2s;
}

button:active { transform: scale(0.96); }
button.loading { background:#999; }
button:disabled { opacity:0.6; }

.checked { background:#e8f5e9; }
.unchecked { background:#fff3e0; }
</style>
</head>

<body>

<div class="card">
  <h2 id="title"></h2>

  <div id="tableArea">載入中...</div>

  <input id="checker" placeholder="請輸入複核者姓名">
  <button id="btn" onclick="submitCheck()">確認複核</button>

  <p id="msg"></p>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzG-rsW9enCg1uOJwCardM9xyUQS2QbIUwEXj4ylV_D-xhKupgSpWmEstwo5lQsUHTBgg/exec";

const device = new URLSearchParams(location.search).get("device");
document.getElementById("title").innerText = device + " 複核";

let rows = [];

// 🔵 載入資料
fetch(API + "?action=get&device=" + device)
.then(r => r.json())
.then(data => {

  rows = data;

  if(data.length === 0){
    document.getElementById("tableArea").innerText = "⚠️ 沒有資料";
    return;
  }

  let html = "<table><tr><th>日期</th><th>時間</th><th>溫度</th><th>人員</th><th>備註</th><th>複核</th></tr>";

  data.forEach(d => {

    // ⏰ 修正時間
    let t = "";
    if(d.time){
      let time = new Date(d.time);
      t = time.getHours().toString().padStart(2,'0') + ":" +
          time.getMinutes().toString().padStart(2,'0');
    }

    // 📅 複核資訊
    let checkInfo = "未複核";
    let rowClass = "unchecked";

    if(d.checker){

      let cd = d.checkDate ? new Date(d.checkDate) : null;
      let ct = d.checkTime ? new Date(d.checkTime) : null;

      let dateStr = cd ?
        cd.getFullYear() + "/" +
        (cd.getMonth()+1).toString().padStart(2,'0') + "/" +
        cd.getDate().toString().padStart(2,'0') : "";

      let timeStr = ct ?
        ct.getHours().toString().padStart(2,'0') + ":" +
        ct.getMinutes().toString().padStart(2,'0') : "";

      checkInfo = `${d.checker}<br>${dateStr} ${timeStr}`;
      rowClass = "checked";
    }

    html += `<tr class="${rowClass}">
      <td>${d.date}</td>
      <td>${t}</td>
      <td>${d.temp}</td>
      <td>${d.name}</td>
      <td>${d.remark || ""}</td>
      <td>${checkInfo}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("tableArea").innerHTML = html;
});


// 🔥 複核送出
async function submitCheck(){

  const btn = document.getElementById("btn");
  const checker = document.getElementById("checker").value.trim();

  if(!checker){
    alert("請輸入姓名");
    return;
  }

  btn.disabled = true;
  btn.classList.add("loading");
  btn.innerText = "送出中...";

  for (const r of rows) {
    if(!r.checker){
      await fetch(API, {
        method: "POST",
        body: new URLSearchParams({
          action: "check",
          device: device,
          row: r.row,
          checker: checker
        })
      });
    }
  }

  // ✅ 完成畫面（取代關閉）
  document.body.innerHTML = `
    <div style="text-align:center;padding:40px;">
      <h2>✅ 複核完成</h2>
      <p>可直接關閉此頁面</p>
    </div>
  `;
}

</script>

</body>
</html>
