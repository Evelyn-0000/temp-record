<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冷凍冷藏溫度記錄表</title>

<style>
body {
  font-family: sans-serif;
  padding:20px;
  background:#f5f5f5;
}

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2 { margin-top:0; }

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

/* 🔴 異常紅框 */
input.warning {
  border:2px solid red;
  background:#fff5f5;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
}

button:active {
  transform: scale(0.96);
}

#msg {
  margin-top:15px;
}

.warning-text {
  color:red;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
  <h2 id="title">設備記錄</h2>

  <input id="temp" type="number" step="0.1" placeholder="請輸入溫度">
  <div id="alert" class="warning-text"></div>

  <input id="name" placeholder="請輸入姓名">
  <input id="remark" placeholder="備註(若有異常請填寫原因)">

  <button id="submitBtn" onclick="send()">送出</button>

  <p id="msg"></p>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyYSn83uqtxM08R3qIOH7RINUDGAdctB1a2d31_qGFS2XHlTkIvyyER_jgu4Bo5UMz96g/exec";

// 取得設備
function getDevice(){
  return new URLSearchParams(window.location.search).get("device");
}

const device = getDevice();
const tempInput = document.getElementById("temp");
const alertBox = document.getElementById("alert");

// 顯示標題
document.getElementById("title").innerText =
  device ? device + " 溫度記錄" : "⚠️ 未指定設備";


// 🔥 異常判斷
tempInput.addEventListener("input", () => {
  const temp = parseFloat(tempInput.value);

  if(isNaN(temp)){
    alertBox.innerText = "";
    tempInput.classList.remove("warning");
    return;
  }

  // 冷藏 > 7
  if(device.includes("冷藏") && temp > 7){
    alertBox.innerText = "⚠️ 溫度過高（冷藏應 ≤ 7°C）";
    tempInput.classList.add("warning");
  }
  // 冷凍 > -18
  else if(device.includes("冷凍") && temp > -18){
    alertBox.innerText = "⚠️ 溫度過高（冷凍應 ≤ -18°C）";
    tempInput.classList.add("warning");
  }
  else{
    alertBox.innerText = "";
    tempInput.classList.remove("warning");
  }
});


function send(){

  const btn = document.getElementById("submitBtn");
  const msg = document.getElementById("msg");

  const temp = tempInput.value.trim();
  const name = document.getElementById("name").value.trim();
  const remark = document.getElementById("remark").value.trim();

  if(!device){
    msg.innerText = "❌ 沒有設備參數";
    return;
  }

  if(!temp){
    msg.innerText = "⚠️ 請輸入溫度";
    return;
  }

  if(!name){
    msg.innerText = "⚠️ 請輸入姓名";
    return;
  }

  // 🔴 異常強制填備註
  const t = parseFloat(temp);
  if(
    (device.includes("冷藏") && t > 7) ||
    (device.includes("冷凍") && t > -18)
  ){
    if(!remark){
      msg.innerText = "⚠️ 異常請填寫備註";
      return;
    }
  }

  btn.disabled = true;
  btn.innerText = "送出中...";
  msg.innerText = "";

  fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      action: "write",
      temp: temp,
      name: name,
      remark: remark,
      device: device
    })
  })
  .then(() => {
    msg.innerText = "✅ 已送出";

    tempInput.value = "";
    document.getElementById("name").value = "";
    document.getElementById("remark").value = "";
    alertBox.innerText = "";
  })
  .catch(() => {
    msg.innerText = "❌ 寫入失敗";
  })
  .finally(() => {
    btn.disabled = false;
    btn.innerText = "送出";
  });
}

</script>

</body>
</html>
